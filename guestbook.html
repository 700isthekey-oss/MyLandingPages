<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guestbook | ETOILE</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="./index.html">ETOILE</a>

    <nav class="nav" aria-label="Main navigation">
      <a href="./index.html">Home</a>
      <a href="./guestbook.html">Guestbook</a>
    </nav>

    <div class="header-actions">
      <button class="search-toggle" type="button" id="search-toggle" aria-label="Open search">Search</button>
      <div class="language-switch" aria-label="Language switch">
        <button type="button" class="active">KR</button>
        <span>/</span>
        <button type="button">EN</button>
      </div>
      <a class="login-link" href="./login.html">Login</a>
      <a class="cart-pill" href="./cart.html" aria-label="Cart">Cart <span id="cart-count">0</span></a>
    </div>
  </header>

  <div class="search-panel" id="search-panel" hidden>
    <div class="search-box">
      <label for="product-search">Search ETOILE</label>
      <div class="search-row">
        <input id="product-search" type="search" placeholder="Search leotard, skirt, warmer, bag...">
        <button type="button" id="search-close">Close</button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <main>
    <section id="guestbook" class="guestbook-section">
      <div class="guestbook-inner">
        <p class="section-kicker">Guestbook</p>
        <h1>Notes from the Dreamers</h1>
        <p class="guestbook-intro">
          ETOILE의 시작을 함께 지나간 사람들의 기록.
        </p>

        <form id="guestbook-form" class="guestbook-form">
          <input id="guestbook-name" type="text" placeholder="Name" maxlength="30" required>
          <textarea id="guestbook-message" placeholder="Leave a note" maxlength="500" required></textarea>
          <button type="submit">Leave a Note</button>
        </form>

        <div id="guestbook-list" class="guestbook-list"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-brand">
      <strong>ETOILE</strong>
      <span>KEEP YOUR DREAMS ALIVE</span>
    </div>
    <div class="footer-info">
      <p><b>CEO</b> Chloe KWAK</p>
      <p><b>BUSINESS LICENSE</b> 2026-06-17</p>
      <p><b>E-MAIL</b> ETOILE@GMAIL.COM</p>
      <p><b>ADDRESS</b> South Korea, Busan, Busanjin District, Jungang-daero, 668 에이원프라자 14F</p>
    </div>
    <a class="instagram-link" href="https://www.instagram.com/" target="_blank" rel="noreferrer" aria-label="Open Instagram">◎ Instagram</a>
  </footer>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="guestbook.js?v=999999"></script>
</body>
</html>
